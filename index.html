<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Secrétariat Bureautique</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌑 FOND */
body{
margin:0;
font-family:Arial,sans-serif;
color:white;
background:linear-gradient(-45deg,#0a0f1f,#111a33,#0d1b2a,#1b263b);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
overflow-x:hidden;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;
height:60px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.title{
font-family:'Dancing Script',cursive;
font-size:22px;
color:pink;
}

#time{
font-weight:bold;
font-size:14px;
}
.menu{
position:fixed;
top:60px; /* hauteur du header */
right:-260px;
width:260px;
height:calc(100vh - 60px);

background:rgba(10,15,30,0.98);
backdrop-filter:blur(10px);

display:flex;
flex-direction:column;
gap:5px;

overflow-y:auto;
overflow-x:hidden;
-webkit-overflow-scrolling:touch;

/* 👇 évite que les éléments soient cachés */
padding-top:15px;
padding-bottom:120px;

transition:0.3s;
z-index:999;

border-left:1px solid rgba(255,255,255,0.1);
}
.menu.open{
right:0;
}
.menu::-webkit-scrollbar{
width:4px;
}

.menu::-webkit-scrollbar-thumb{
background:rgba(255,255,255,0.3);
border-radius:10px;
}
/* MENU FIXÉ + SCROLL ULTRA FIX */
.menu{
position:fixed;
top:60px; /* 🔥 sous le header */
right:-260px;
width:260px;
height:calc(100vh - 60px); /* 🔥 hauteur parfaite */
background:rgba(10,15,30,0.98);
backdrop-filter:blur(10px);
display:flex;
flex-direction:column;
transition:0.3s;
z-index:999;

overflow-y:auto;
-webkit-overflow-scrolling:touch;

/* 🔥 IMPORTANT */
padding-bottom:120px; /* espace bas pour dernier lien */
}

/* SCROLL visible */
.menu::-webkit-scrollbar{
width:6px;
}
.menu::-webkit-scrollbar-thumb{
background:gold;
border-radius:10px;
}

.menu a{
padding:14px;
text-decoration:none;
color:white;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:14px;
}

.menu a:hover{
background:rgba(255,255,255,0.1);
}

.menu.open{
right:0;
}

/* CONTENU */
.content{
margin-top:80px;
text-align:center;
padding:20px;
}

/* FOOTER */
footer{
position:fixed;
bottom:0;
width:100%;
text-align:center;
padding:10px;
font-size:12px;
background:rgba(0,0,0,0.5);
z-index:1;
}

</style>
</head>

<body>

<header>
<div class="title">🩷 Mini Secrétariat</div>
<div id="time"></div>

<div onclick="toggleMenu()" style="cursor:pointer;">
☰
</div>
</header>

<!-- MENU -->
<div class="menu" id="menu">

<a href="https://cv-ruby-nu-25.vercel.app/" target="_blank">📄 CV</a>
<a href="https://lettre-de-motivation-smoky.vercel.app/" target="_blank">🧭 Lettre</a>
<a href="https://module-paiement.vercel.app/" target="_blank">📅 Calendrier</a>
<a href="https://secr-taire.vercel.app/" target="_blank">🏃 Sport</a>
<a href="https://api-lime-nine-94.vercel.app/" target="_blank">⚰️ Inhumation</a>
<a href="https://devislesfacilitateurs.vercel.app/" target="_blank">🏗️ Devis</a>
<a href="https://cartes-de-visite-pro-6wsn.vercel.app/" target="_blank">💧 Cartes</a>
<a href="https://certificat-dipl-me.vercel.app/" target="_blank">🎓 Certificat</a>
<a href="https://portrait-hd.vercel.app/" target="_blank">🖼️ Portrait</a>
<a href="https://contrat-de-travail.vercel.app/" target="_blank">🦺 Contrat</a>
<a href="https://fiche-tarifaire.vercel.app/" target="_blank">📋 Tarifs</a>
<a href="https://billet-d-invitation-mariage.vercel.app/" target="_blank">💌 Mariage</a>
<a href="https://lesfacilitateurs.vercel.app" target="_blank">🏠 Accueil</a>

<a href="#" onclick="addLink()">➕ Ajouter lien</a>

</div>

<div class="content">
<h2>Bienvenue ✨</h2>
<p>Mini secrétariat bureautique professionnel</p>
</div>

<footer>
© Lesfacilitateurs Groupe
</footer>

<script>

function toggleMenu(){
document.getElementById("menu").classList.toggle("open");
}

/* HEURE */
function updateTime(){
document.getElementById("time").innerText =
new Date().toLocaleTimeString("fr-FR");
}
setInterval(updateTime,1000);
updateTime();

/* AJOUT LIEN */
function addLink(){
let name = prompt("Nom ?");
let url = prompt("URL ?");

if(name && url){
let a = document.createElement("a");
a.href = url;
a.target = "_blank";
a.textContent = "🔗 " + name;
document.getElementById("menu").appendChild(a);
}
}

</script>

</body>
</html>
